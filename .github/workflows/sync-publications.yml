name: Sync Publications from Google Scholar

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at UTC 3:00
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Sync publications from Google Scholar
        env:
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/sync_publications.py

      - name: Commit and push changes
        if: success()
        run: |
          if git diff --quiet data/publications.yaml; then
            echo "No changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/publications.yaml
            git commit -m "content: sync publications from Google Scholar (weekly)"
            git push
          fi
